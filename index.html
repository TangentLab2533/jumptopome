<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转至石榴树书库</title>
    <meta http-equiv="refresh" content="3;url=https://pomegranate.qqxxzz.com">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f7fa;color:#333;}
        .box{text-align:center;}
        h2{margin-bottom:20px;font-size:24px;}
        .tip{color:#666;margin:15px 0;}
        .btn{display:inline-block;margin-top:10px;padding:10px 26px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;transition:0.2s;}
        .btn:hover{background:#1d4ed8;}
    </style>
</head>
<body>
    <div class="box">
        <h2>正在自动跳转石榴树书库...</h2>
        <p class="tip">3秒后自动前往 pomegranate.qqxxzz.com</p>
        <p>若未自动跳转，请点击下方按钮</p>
        <a href="https://pomegranate.qqxxzz.com" class="btn">立即前往</a>
    </div>

    <script>
        // JS兜底跳转
        setTimeout(()=>{
            window.location.href = "https://pomegranate.qqxxzz.com";
        },3000);
    </script>
</body>
</html>
